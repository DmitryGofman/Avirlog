name: Deploy web (static)

# Builds the Expo web export and publishes it to GitHub Pages.
# Requires repo Settings → Pages → Source = "GitHub Actions".
# Optional: add an EXPO_PUBLIC_BACKEND_URL secret to point the build at a
# live backend. Without it the app deploys as a UI-only preview.

on:
  push:
    branches:
      - claude/deployment-readiness-ui-1b4uyr
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Export static web build
        env:
          EXPO_PUBLIC_BACKEND_URL: ${{ secrets.EXPO_PUBLIC_BACKEND_URL }}
        run: npx expo export --platform web

      - name: Add SPA fallback + bypass Jekyll
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
