# Render blueprint for the AvirLog API. In Render: New → Blueprint → connect
# this repo. Render reads this file, builds backend/Dockerfile, and deploys.
# Set MONGO_URL in the dashboard (it is marked sync:false so it is not stored
# in the repo).
services:
  - type: web
    name: avirlog-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    plan: free
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: avirlog
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: EMERGENT_GOOGLE_ENABLED
        value: "false"
